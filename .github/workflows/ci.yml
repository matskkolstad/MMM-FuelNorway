name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache-dependency-path: package-lock.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: node --run lint

      - name: Test
        run: node --run test
